<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharma Notes</title>
    <style>
        body {
            background: linear-gradient(45deg, #6a0dad, #8a2be2);
            font-family: Arial, sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .subject {
            border: 2px solid #ff6347;
            border-radius: 5px;
            margin: 15px 0;
            padding: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .subject:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        h1 {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Pharma Notes</h1>
    <div class="subject">
        <h2>Subject 1</h2>
        <p>Notes for subject 1...</p>
    </div>
    <div class="subject">
        <h2>Subject 2</h2>
        <p>Notes for subject 2...</p>
    </div>
    <div class="subject">
        <h2>Subject 3</h2>
        <p>Notes for subject 3...</p>
    </div>
</body>
</html>
