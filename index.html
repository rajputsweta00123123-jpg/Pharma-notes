<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharma Notes Hub</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #6A0DAD, #FF6F91);
}

/* HEADER */
header {
    text-align: center;
    color: white;
    padding: 20px;
}

/* GLASS CARD */
.glass {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 20px;
    margin: 15px;
    color: white;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

/* INPUT */
input {
    width: 90%;
    padding: 10px;
    border-radius: 20px;
    border: none;
    margin: 10px 0;
}

/* BUTTON */
.button {
    background: #FF6F91;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    color: white;
    cursor: pointer;
}

/* NAV */
nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding: 10px;
    color: white;
}

/* TOAST */
#toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: black;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    display: none;
}
</style>
</head>

<body>

<header>
<h2>💊 Pharma Notes Hub</h2>
<p>Study Smart. Score Better.</p>
</header>

<!-- NOTES -->
<div class="glass">
<h3>📚 Notes</h3>
<div id="notesContainer"></div>
</div>

<!-- ADMIN -->
<div class="glass">
<h3>📝 Add Notes (Admin)</h3>
<input id="title" placeholder="Note Title">
<input id="link" placeholder="Paste PDF/Drive Link">
<button class="button" onclick="addNote()">Add Note</button>
</div>

<!-- TOAST -->
<div id="toast">Added!</div>

<!-- NAV -->
<nav>
<span onclick="loadNotes()">🏠 Home</span>
<span>📚 Notes</span>
<span>👤 Profile</span>
</nav>

<script>

/* TEMP STORAGE (works without Firebase) */
let notes = [];

/* TOAST */
function showToast(msg) {
    let toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.style.display = "block";

    setTimeout(() => {
        toast.style.display = "none";
    }, 2000);
}

/* ADD NOTE */
function addNote() {
    let title = document.getElementById("title").value;
    let link = document.getElementById("link").value;

    if(title === "" || link === "") {
        showToast("Fill all fields!");
        return;
    }

    notes.push({title, link});
    showToast("Note Added!");
    loadNotes();
}

/* LOAD NOTES */
function loadNotes() {
    let container = document.getElementById("notesContainer");
    container.innerHTML = "";

    notes.forEach(note => {
        let div = document.createElement("div");
        div.className = "glass";
        div.innerHTML = `
            <h4>${note.title}</h4>
            <a href="${note.link}" target="_blank">
            <button class="button">Open</button></a>
        `;
        container.appendChild(div);
    });
}

/* AUTO LOAD */
loadNotes();

</script>

</body>
</html>
